name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  ci:
    name: Lint, Typecheck & Test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint
        env:
          SKIP_ENV_VALIDATION: true

      - name: Typecheck
        run: npm run typecheck
        env:
          SKIP_ENV_VALIDATION: true

      - name: Unit tests
        run: npm run test
        env:
          SKIP_ENV_VALIDATION: true
